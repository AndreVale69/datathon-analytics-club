services:
  api:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      LISTINGS_RAW_DATA_DIR: /app/raw_data
      LISTINGS_DB_PATH: /data/listings.db
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      LISTINGS_S3_BUCKET: ${LISTINGS_S3_BUCKET:-crawl-data-951752554117-eu-central-2-an}
      LISTINGS_S3_REGION: ${LISTINGS_S3_REGION:-eu-central-2}
      LISTINGS_S3_PREFIX: ${LISTINGS_S3_PREFIX:-prod}
    volumes:
      - listings_data:/data
      - .:/app
  mcp:
    build:
      context: .
    command: uvicorn apps_sdk.server.main:app --host 0.0.0.0 --port 8001
    environment:
      APPS_SDK_LISTINGS_API_BASE_URL: http://api:8000
      APPS_SDK_PUBLIC_BASE_URL: http://localhost:8001
      APPS_SDK_PORT: 8001
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      LISTINGS_S3_BUCKET: ${LISTINGS_S3_BUCKET:-crawl-data-951752554117-eu-central-2-an}
      LISTINGS_S3_REGION: ${LISTINGS_S3_REGION:-eu-central-2}
      LISTINGS_S3_PREFIX: ${LISTINGS_S3_PREFIX:-prod}
    ports:
      - "8001:8001"
    depends_on:
      - api
    volumes:
      - .:/app
  tests:
    build:
      context: .
    profiles:
      - test
    command: pytest
    environment:
      LISTINGS_RAW_DATA_DIR: /app/raw_data
      LISTINGS_DB_PATH: /tmp/listings.db
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      LISTINGS_S3_BUCKET: ${LISTINGS_S3_BUCKET:-crawl-data-951752554117-eu-central-2-an}
      LISTINGS_S3_REGION: ${LISTINGS_S3_REGION:-eu-central-2}
      LISTINGS_S3_PREFIX: ${LISTINGS_S3_PREFIX:-prod}
    volumes:
      - .:/app

volumes:
  listings_data:
